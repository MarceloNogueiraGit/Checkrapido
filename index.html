<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ordem de Serviço — JCE Transportes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="header-title">
      <h1>Ordem de Serviço</h1>
      <span>JCE Transportes — Manutenção Veicular</span>
    </div>
    <div class="header-logo">
      <img id="header-logo-img" src="" alt="JCE Transportes" />
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main>

    <!-- DADOS GERAIS -->
    <div class="card">
      <h2>
        Dados da Ordem de Serviço
        <span class="os-tag" id="os-number">OS Nº -----</span>
      </h2>

      <div class="fields-grid">
        <div class="field-group">
          <label for="data">Data</label>
          <input type="date" id="data" />
        </div>
        <div class="field-group">
          <label for="hora">Hora</label>
          <input type="time" id="hora" />
        </div>
        <div class="field-group full">
          <label for="motorista">Nome do Motorista</label>
          <input type="text" id="motorista" placeholder="Nome completo do motorista" />
        </div>
      </div>
    </div>

    <!-- TIPO + PLACAS -->
    <div class="card">
      <h2>Tipo de Equipamento e Placas</h2>

      <!-- Toggle tipo -->
      <div style="margin-bottom: 22px;">
        <label style="display:block; margin-bottom: 8px;">Tipo de Semi-Reboque</label>
        <div class="tipo-toggle">
          <button class="tipo-btn" id="btn-vanderleia">Vanderleia</button>
          <button class="tipo-btn" id="btn-rodotrem">Rodotrem</button>
        </div>
      </div>

      <!-- Placas -->
      <div class="fields-grid">

        <div class="field-group full">
          <label for="placa-cavalo">Placa — Cavalo Mecânico</label>
          <input type="text" id="placa-cavalo" placeholder="AAA-0000 ou AAA0A00" maxlength="8" style="text-transform:uppercase" />
        </div>

        <!-- SR1 — sempre visível após toggle -->
        <div class="reboque-block visible" id="block-sr1" style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px;">
          <div class="field-group">
            <label id="placa-sr1-label" for="placa-sr1">Placa Semi-Reboque</label>
            <input type="text" id="placa-sr1" placeholder="AAA-0000 ou AAA0A00" maxlength="8" style="text-transform:uppercase" />
          </div>
          <!-- SR2 — só aparece no rodotrem -->
          <div class="field-group" id="block-sr2" style="display:none;">
            <label for="placa-sr2">Placa Semi-Reboque 2</label>
            <input type="text" id="placa-sr2" placeholder="AAA-0000 ou AAA0A00" maxlength="8" style="text-transform:uppercase" />
          </div>
        </div>

      </div>
    </div>

    <!-- SERVIÇOS -->
    <div class="card">
      <h2>Descrição dos Serviços</h2>

      <div class="service-block">
        <div class="textarea-label">Cavalo Mecânico</div>
        <textarea id="servico-cavalo" placeholder="Descreva os serviços a serem realizados no cavalo mecânico..."></textarea>
      </div>

      <div class="service-block" id="service-sr1">
        <div class="textarea-label" id="label-sr1">Semi-Reboque</div>
        <textarea id="servico-sr1" placeholder="Descreva os serviços a serem realizados no semi-reboque..."></textarea>
      </div>

      <div class="service-block" id="service-sr2" style="display:none;">
        <div class="textarea-label">Semi-Reboque 2</div>
        <textarea id="servico-sr2" placeholder="Descreva os serviços a serem realizados no semi-reboque 2..."></textarea>
      </div>
    </div>

    <!-- BOTÃO GERAR -->
    <button class="btn-generate" id="btn-gerar">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/>
      </svg>
      Gerar Ordem de Serviço (PDF)
    </button>

  </main>

  <footer>JCE Transportes &copy; 2025 — Sistema de Ordens de Serviço</footer>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Logo base64 -->
  <script src="assets/logo.js"></script>
  <!-- App -->
  <script src="js/app.js"></script>

  <!-- Inject logo into header img -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof LOGO_B64 !== 'undefined') {
        document.getElementById('header-logo-img').src = LOGO_B64;
      }
    });
  </script>

  <!-- Sync rodotrem visibility for SR2 service block -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btnR = document.getElementById('btn-rodotrem');
      const btnV = document.getElementById('btn-vanderleia');
      const sr2Placa   = document.getElementById('block-sr2');
      const sr2Service = document.getElementById('service-sr2');

      function syncRodotrem(isRodo) {
        sr2Placa.style.display   = isRodo ? 'flex' : 'none';
        sr2Service.style.display = isRodo ? 'block' : 'none';
      }

      btnR.addEventListener('click', () => syncRodotrem(true));
      btnV.addEventListener('click', () => syncRodotrem(false));
    });
  </script>

</body>
</html>
